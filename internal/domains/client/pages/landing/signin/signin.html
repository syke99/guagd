<div>

<nav>
  <a href="/" class="nav-brand">
    <img src="/assets/logo.png" alt="Gaugd" class="nav-logo">
    <div class="logo">GAUG<span>D</span></div>
  </a>
  <div class="nav-right">
    <a href="/" class="btn-nav">Home</a>
    <button class="btn-nav"
            hx-get="/waitlist"
            hx-target="#app"
            hx-swap="innerHTML"
            hx-push-url="/waitlist">Request Early Access</button>
  </div>
</nav>

<section class="auth-page">
  <div class="panel-card auth-card">
    <div class="panel-header">
      <div>
        <div class="panel-title">Sign in to Gaugd</div>
        <div class="panel-sub">Your verified build history awaits.</div>
      </div>
    </div>
    <form hx-post="/api/v1/accounts/signin"
          hx-ext="json-enc"
          hx-target="#signin-result"
          hx-swap="innerHTML">
      <div class="signup-fields">
        <input class="signup-input" type="email" name="email" placeholder="your@email.com" required />
        <input class="signup-input" type="password" name="password" placeholder="Password" required />
        <button type="submit" class="btn-primary signup-submit">Sign In →</button>
      </div>
    </form>
    <div id="signin-result"></div>
    <div class="auth-footer">
      <span class="auth-footer-text">Don't have an account?</span>
      <button class="btn-link"
              hx-get="/pages/landing/landing.html"
              hx-target="#app"
              hx-swap="innerHTML"
              hx-push-url="/landing">
        Request Early Access →
      </button>
    </div>
  </div>
</section>

</div>
