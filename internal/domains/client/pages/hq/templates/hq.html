{{define "hq.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@{{.Username}}'s Club HQ — Gaugd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/style.css">
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-brand">
    <img src="/assets/logo.png" alt="Gaugd" class="nav-logo">
    <div class="logo">GAUG<span>D</span></div>
  </div>
  <div class="nav-right">
    {{if .IsOwner}}
    <span style="font-size:13px;color:var(--muted2)">Your club HQ</span>
    {{end}}
  </div>
</nav>

<div style="display:flex;align-items:center;justify-content:center;height:60vh;">
  <p style="font-size:18px;color:var(--muted)">@{{.Username}}'s club HQ — coming soon</p>
</div>

</body>
</html>
{{end}}
