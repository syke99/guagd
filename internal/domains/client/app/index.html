<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaugd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/style.css">
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  var routes = {
    '/signin':           '/pages/landing/signin/signin.html',
    '/signin/failure':   '/pages/landing/signin/failure.html',
    '/signup':           '/pages/landing/signup/signup.html',
    '/signup/failure':   '/pages/landing/signup/failure.html',
    '/waitlist':         '/pages/landing/waitlist/signup.html',
    '/waitlist/success': '/pages/landing/waitlist/success.html',
    '/waitlist/failure': '/pages/landing/waitlist/failure.html',
  };
  var app = document.getElementById('app');
  var frag = routes[location.pathname] || '/pages/landing/landing.html';
  app.setAttribute('hx-get', frag);
  app.setAttribute('hx-trigger', 'load');
  app.setAttribute('hx-swap', 'innerHTML');
  htmx.process(app);
})();
</script>
</body>
</html>
